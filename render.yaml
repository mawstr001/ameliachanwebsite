services:
  - type: web
    name: amelia-chan-violin
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: amelia-data
      mountPath: /opt/data
      sizeGB: 1
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: false
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/data
